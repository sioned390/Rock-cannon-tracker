{% extends 'hello/base.html' %}

{% block title %}Upload Rock Cannon{% endblock %}

{% block content %}
<div class="card">
    <h1>Upload a new rock cannon</h1>
    <p class="muted">Share new discoveries with the community.</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Submit</button>
    </form>
</div>
{% endblock %}
