{% extends 'hello/base.html' %}
{% load i18n %}

{% block title %}{% trans "Upload Rock Cannon" %}{% endblock %}

{% block content %}
<div class="card">
    <h1>{% trans "Upload a new rock cannon" %}</h1>
    <p class="muted">{% trans "Share new discoveries with the community." %}</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">{% trans "Submit" %}</button>
    </form>
</div>
{% endblock %}
