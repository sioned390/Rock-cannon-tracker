<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Rock Cannons{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'hello/styles.css' %}" />
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <header>
        <nav>
            <div>
                <a href="{% url 'home' %}">Rock Cannons</a>
                <a href="{% url 'cannon_list' %}">List</a>
                <a href="{% url 'map_view' %}">Map</a>
                <a href="{% url 'gallery' %}">Gallery</a>
                <a href="{% url 'upload_cannon' %}">Upload</a>
            </div>
            <div>
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}">My Profile</a>
                    <a href="{% url 'logout' %}">Sign out</a>
                {% else %}
                    <a href="{% url 'login' %}">Sign in</a>
                    <a href="{% url 'signup' %}">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
