{% extends 'hello/base.html' %}
{% load i18n %}

{% block title %}{% trans "Sign in" %}{% endblock %}

{% block content %}
<div class="card">
    <h1>{% trans "Sign in" %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">{% trans "Sign in" %}</button>
    </form>
    <p class="muted">{% trans "Need an account?" %} <a href="{% url 'signup' %}">{% trans "Create one" %}</a>.</p>
</div>
{% endblock %}
