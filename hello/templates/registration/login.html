{% extends 'hello/base.html' %}

{% block title %}Sign in{% endblock %}

{% block content %}
<div class="card">
    <h1>Sign in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Sign in</button>
    </form>
    <p class="muted">Need an account? <a href="{% url 'signup' %}">Create one</a>.</p>
</div>
{% endblock %}
