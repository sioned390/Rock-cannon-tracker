{% extends 'hello/base.html' %}

{% block title %}Create account{% endblock %}

{% block content %}
<div class="card">
    <h1>Create an account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Create account</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Sign in</a>.</p>
</div>
{% endblock %}
