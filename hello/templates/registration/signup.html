{% extends 'hello/base.html' %}
{% load i18n %}

{% block title %}{% trans "Create account" %}{% endblock %}

{% block content %}
<div class="card">
    <h1>{% trans "Create an account" %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">{% trans "Create account" %}</button>
    </form>
    <p class="muted">{% trans "Already have an account?" %} <a href="{% url 'login' %}">{% trans "Sign in" %}</a>.</p>
</div>
{% endblock %}
